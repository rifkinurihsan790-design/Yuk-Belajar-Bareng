<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cerdas Cermat Tingkat Tinggi - TPEN4406 Modul 4</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        /* --- DESIGN SYSTEM --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #020205;
            background: radial-gradient(circle at center, #0a051d 0%, #020106 100%);
            color: #f1f5f9;
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* --- 1. INTRO SPLASH SCREEN (ANIMASI MASUK) --- */
        #intro-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: #020106;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: all 0.6s cubic-bezier(0.85, 0, 0.15, 1);
        }
        .podium-neon {
            text-align: center;
            border: 2px solid #00ff66;
            padding: 50px;
            border-radius: 30px;
            box-shadow: 0 0 40px rgba(0, 255, 102, 0.15), inset 0 0 20px rgba(0, 255, 102, 0.05);
            animation: pulseNeon 2.5s infinite alternate;
        }
        .main-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.2rem;
            font-weight: 900;
            color: #00ff66;
            text-shadow: 0 0 20px rgba(0, 255, 102, 0.5);
            letter-spacing: 5px;
        }
        .sub-title {
            font-size: 1.3rem;
            color: #00e5ff;
            margin-top: 15px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        .launch-btn {
            margin-top: 40px;
            padding: 18px 50px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: 900;
            color: #020205;
            background: #00ff66;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(0, 255, 102, 0.4);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .launch-btn:hover {
            background: #00e5ff;
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 0 40px rgba(0, 229, 255, 0.6);
        }

        /* --- 2. CERDAS CERMAT HUB STAGE --- */
        .stage-box {
            display: none;
            width: 92%;
            max-width: 1000px;
            background: rgba(10, 6, 26, 0.85);
            border: 2px solid #1a103c;
            border-radius: 28px;
            padding: 45px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            animation: scaleInStage 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .stage-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #1a103c;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        .counter-pill {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            background: #0d0620;
            padding: 8px 20px;
            border-radius: 14px;
            border: 1px solid #00e5ff;
            color: #00e5ff;
        }
        .scoreboard-pill {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            background: #051a10;
            padding: 8px 25px;
            border-radius: 14px;
            border: 1px solid #00ff66;
            color: #00ff66;
            text-shadow: 0 0 10px rgba(0, 255, 102, 0.3);
        }

        /* DISPLAY PERTANYAAN */
        .prompt-panel {
            background: #060312;
            border-left: 6px solid #00ff66;
            padding: 35px;
            border-radius: 16px;
            margin-bottom: 30px;
        }
        .prompt-text {
            font-size: 1.5rem;
            font-weight: 700;
            line-height: 1.5;
            color: #f8fafc;
        }

        /* PILIHAN JAWABAN (A, B, C, D, E) */
        .choices-cluster {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .choice-node {
            background: #0f0926;
            border: 1px solid #23164d;
            border-radius: 14px;
            padding: 16px 25px;
            font-size: 1.15rem;
            font-weight: 600;
            color: #cbd5e1;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            align-items: center;
        }
        .choice-node:hover {
            background: #180e3d;
            border-color: #00ff66;
            color: #fff;
            transform: translateX(6px);
        }
        .choice-alphabet {
            font-family: 'Orbitron', sans-serif;
            color: #ff007f;
            font-weight: 900;
            margin-right: 20px;
            font-size: 1.3rem;
            min-width: 25px;
        }

        /* STATUS VALIDASI KUIS */
        .choice-node.node-correct {
            background: linear-gradient(45deg, #047857, #10b981) !important;
            border-color: #34d399 !important;
            color: #fff !important;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
        }
        .choice-node.node-wrong {
            background: linear-gradient(45deg, #b91c1c, #ef4444) !important;
            border-color: #f87171 !important;
            color: #fff !important;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
            animation: vibrate 0.3s linear;
        }

        /* --- 3. HASIL AKHIR --- */
        .evaluation-panel {
            display: none;
            text-align: center;
        }
        .eval-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.2rem;
            color: #00ff66;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 255, 102, 0.4);
        }
        .metric-score {
            font-family: 'Orbitron', sans-serif;
            font-size: 6.5rem;
            font-weight: 900;
            color: #00e5ff;
            margin: 15px 0;
            text-shadow: 0 0 30px rgba(0, 229, 255, 0.5);
        }
        .eval-desc {
            font-size: 1.35rem;
            color: #94a3b8;
            max-width: 700px;
            margin: 0 auto 40px auto;
            line-height: 1.6;
        }

        /* --- TIMELINE ANIMASI --- */
        @keyframes pulseNeon {
            0% { border-color: #00ff66; box-shadow: 0 0 20px rgba(0, 255, 102, 0.1); }
            100% { border-color: #00e5ff; box-shadow: 0 0 35px rgba(0, 229, 255, 0.3); }
        }
        @keyframes scaleInStage {
            from { transform: scale(0.96); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        @keyframes vibrate {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        @media (max-width: 768px) {
            .main-title { font-size: 2rem; }
            .prompt-text { font-size: 1.1rem; }
            .choice-node { font-size: 0.95rem; padding: 12px 15px; }
        }

        /* --- BUTTON KEMBALI SEGITIGA --- */
.back-btn {
    position: fixed;
    top: 20px;
    left: 20px;
    width: 60px;
    height: 60px;
    background: linear-gradient(135deg, #bd00ff, #00e5ff);
    clip-path: polygon(0% 0%, 100% 50%, 0% 100%);
    cursor: pointer;
    border: none;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    z-index: 10000;
    display: flex;
    align-items: center;
    padding-left: 10px;
    color: white;
    font-weight: bold;
    text-decoration: none;
    box-shadow: 5px 5px 15px rgba(189, 0, 255, 0.3);
}

.back-btn:hover {
    transform: scale(1.1) rotate(-5deg);
    box-shadow: 0 0 25px rgba(0, 229, 255, 0.6);
    background: #00e5ff;
}

.back-btn:active {
    transform: scale(0.95);
    box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
}
    </style>
</head>
<body>

    <a href="materi.html" class="back-btn" title="Kembali">
    <span style="font-size: 1.2rem;">◀</span>
</a>

    <!-- STAGE INTRO (ANIMASI MASUK) -->
    <div id="intro-screen">
        <div class="podium-neon">
            <div class="main-title">CERDAS CERMAT</div>
            <div class="sub-title">TPEN4406 ACADEMIC CHALLENGE • MODUL 4</div>
            <button class="launch-btn" onclick="engageSystem()">MULAI UJIAN MANDIRI</button>
        </div>
    </div>

    <!-- LIVE GAME ARENA -->
    <div class="stage-box" id="arena-stage">
        <div class="stage-header">
            <div class="counter-pill" id="display-idx">PERTANYAAN 1 / 10</div>
            <div class="scoreboard-pill">SKOR: <span id="display-score">0</span></div>
        </div>
        
        <div class="prompt-panel">
            <div class="prompt-text" id="display-prompt">Mengambil basis data evaluasi akademis...</div>
        </div>

        <div class="choices-cluster" id="display-choices">
            <!-- Pilihan jawaban A, B, C, D, E dimuat di sini -->
        </div>
    </div>

    <!-- EVALUASI PANEL SKOR AKHIR -->
    <div class="stage-box evaluation-panel" id="evaluation-stage">
        <div class="eval-title">HASIL KELULUSAN UAS</div>
        <p style="font-size: 1.1rem; color: #64748b; letter-spacing: 2px; text-transform: uppercase;">Akumulasi Nilai Akhir</p>
        <div class="metric-score" id="final-metric">0</div>
        <div class="eval-desc" id="final-commentary">Menganalisis hasil jawaban...</div>
        <button class="launch-btn" onclick="window.location.reload()">COBA LAGI / REMEDI</button>
    </div>

    <script>
        // DATA KUIS HOTS 5 OPSI (A, B, C, D, E) DENGAN KOREKSI PROGRAM TOTAL
        const academicDatabase = [
            {
                q: "Berdasarkan tinjauan e-readiness dalam inovasi pendidikan, kesiapan infrastruktur teknologi tidak hanya merujuk pada aspek kuantitas kepemilikan perangkat keras, melainkan yang paling mendasar adalah...",
                options: [
                    "Ketersediaan alokasi dana operasional pembelian server pusat",
                    "Kapasitas, kecenderungan, dan kematangan mental komunitas/SDM untuk menyerap nilai pemanfaatan TIK",
                    "Kecepatan transmisi jaringan nirkabel di area institusi",
                    "Jumlah lisensi software e-learning berbayar yang dimiliki",
                    "Rasio jumlah komputer dengan jumlah mahasiswa secara linear"
                ],
                correct: 1
            },
            {
                q: "Seorang mahasiswa Universitas Terbuka yang memiliki keyakinan penuh akan kemampuannya sendiri dalam mengoperasikan learning management system (LMS) serta menyelesaikan tugas-tugas digital secara mandiri merepresentasikan indikator kesiapan...",
                options: [
                    "Intrinsic Goal Orientation",
                    "Extrinsic Goal Orientation",
                    "Metacognitive Self-Regulation",
                    "Self-Efficacy",
                    "Effort Regulation"
                ],
                correct: 3
            },
            {
                q: "Ketika mahasiswa memproses bahan bacaan digital dengan cara merekonstruksi hierarki konsep, memetakan diagram hubungan antar-bab, dan menstrukturkan poin materi tanpa mengubah isi, ia sedang menerapkan strategi kognitif...",
                options: [
                    "Rehearsal Strategy",
                    "Elaboration Strategy",
                    "Organization Strategy",
                    "Metacognitive Regulation",
                    "Help Seeking Mechanism"
                ],
                correct: 2
            },
            {
                q: "Strategi belajar mandiri di mana mahasiswa aktif memperluas pemahaman dengan mengaitkan materi modul baru TIK dengan pengalaman konseptual yang sudah didapatkan pada semester sebelumnya disebut...",
                options: [
                    "Elaboration Strategy",
                    "Rehearsal Strategy",
                    "Organization Strategy",
                    "Peer Learning",
                    "Effort Regulation"
                ],
                correct: 0
            },
            {
                q: "Komponen regulasi diri (Metacognitive Self-Regulation) sangat krusial bagi mahasiswa UT. Tindakan nyata yang mencerminkan komponen kontrol ini dalam e-learning adalah...",
                options: [
                    "Mengunduh seluruh file modul tanpa membacanya terlebih dahulu",
                    "Menunggu instruksi langsung dari tutor sebelum masuk ke kelas digital",
                    "Merencanakan waktu belajar, memantau pemahaman personal, dan memodifikasi strategi saat mengalami kendala",
                    "Meminta bantuan teknisi kampus setiap terjadi hambatan login jaringan",
                    "Memilih mata kuliah yang hanya memiliki sedikit komponen tugas praktik TIK"
                ],
                correct: 2
            },
            {
                q: "Kemampuan mahasiswa untuk mempertahankan fokus, komitmen, dan daya juang belajar di depan perangkat digital, meskipun modul e-readiness yang sedang dibaca memiliki tingkat kerumitan yang sangat tinggi, merupakan manifestasi dari...",
                options: [
                    "Help Seeking Strategy",
                    "Effort Regulation",
                    "Peer Learning Alignment",
                    "Rehearsal Strategy",
                    "Extrinsic Orientation"
                ],
                correct: 1
            },
            {
                q: "Dalam proses transisi institusi menuju era pembelajaran inovatif berbasis TIK, fase di mana para tenaga pendidik secara proaktif memodifikasi, mengadaptasi, dan merancang sumber belajar digital orisinal secara mandiri disebut...",
                options: [
                    "Fase Infiltrasi Infrastruktur Teknis",
                    "Fase Peningkatan Kompetensi Dasar TIK",
                    "Fase Pengembangan Sumber Daya (Resource Development)",
                    "Fase Standarisasi Kebijakan Sentral",
                    "Fase Evaluasi Tradisional Terstruktur"
                ],
                correct: 2
            },
            {
                q: "Transformasi peran dosen/guru dalam paradigma pembelajaran konstruktivisme abad 21 yang dipicu oleh implementasi TIK secara mendasar mengubah posisi pendidik menjadi...",
                options: [
                    "Satu-satunya sumber kebenaran ilmiah struktural",
                    "Fasilitator dan perancang skenario kegiatan belajar peserta didik",
                    "Pengawas administratif ketertiban regulasi ruang kelas",
                    "Evaluator tunggal yang mengandalkan tes hafalan tekstual",
                    "Penyampai materi mekanis (penceramah tunggal) di mimbar"
                ],
                correct: 1
            },
            {
                q: "Pengembangan e-readiness pada level kelembagaan jaringan sekolah (SchoolNets) bertujuan untuk mendorong efisiensi adopsi inovasi pembelajaran melalui pemanfaatan...",
                options: [
                    "Perangkat keras impor berspesifikasi militer",
                    "Platform Open Source dan Open Educational Resources (OER)",
                    "Sistem penggajian guru berbasis menit kerja online",
                    "Aplikasi pengawas aktivitas komputer siswa yang kaku",
                    "Metode pengajaran satu arah secara klasikal"
                ],
                correct: 1
            },
            {
                q: "Strategi belajar mandiri mahasiswa dengan metode mengulang membaca teks digital, menghafal definisi kata demi kata tanpa melakukan elaborasi makna atau modifikasi peta konsep dikategorikan sebagai...",
                options: [
                    "Organization Strategy",
                    "Elaboration Strategy",
                    "Metacognitive Strategy",
                    "Peer Learning",
                    "Rehearsal Strategy"
                ],
                correct: 4
            }
        ];

        let indexTrek = 0;
        let nilaiAkumulasi = 0;
        let kendaliKlik = true;

        function engageSystem() {
            const screen = document.getElementById('intro-screen');
            screen.style.opacity = '0';
            screen.style.transform = 'translateY(-30px)';
            
            setTimeout(() => {
                screen.style.display = 'none';
                document.getElementById('arena-stage').style.display = 'block';
                tampilkanTantangan();
            }, 600);
        }

        function tampilkanTantangan() {
            kendaliKlik = true;
            const item = academicDatabase[indexTrek];
            
            document.getElementById('display-idx').innerText = `PERTANYAAN ${indexTrek + 1} / ${academicDatabase.length}`;
            document.getElementById('display-prompt').innerText = item.q;
            
            const klasterOpsi = document.getElementById('display-choices');
            klasterOpsi.innerHTML = '';
            
            const abjadPrefix = ['A', 'B', 'C', 'D', 'E'];
            
            // Perbaikan fatal looping: Membaca array options yang berisi 5 pilihan
            item.options.forEach((teksJawaban, idx) => {
                const node = document.createElement('div');
                node.className = 'choice-node';
                node.innerHTML = `<span class="choice-alphabet">${abjadPrefix[idx]}</span> ${teksJawaban}`;
                node.onclick = () => eksekusiValidasi(idx, node);
                klasterOpsi.appendChild(node);
            });
        }

        function eksekusiValidasi(idxTerpilih, objekNode) {
            if (!kendaliKlik) return;
            kendaliKlik = false;
            
            const jawabanBenarIdx = academicDatabase[indexTrek].correct;
            const daftarNode = document.querySelectorAll('.choice-node');
            
            if (idxTerpilih === jawabanBenarIdx) {
                objekNode.classList.add('node-correct');
                nilaiAkumulasi += 10;
                document.getElementById('display-score').innerText = nilaiAkumulasi;
            } else {
                objekNode.classList.add('node-wrong');
                daftarNode[jawabanBenarIdx].classList.add('node-correct');
            }
            
            setTimeout(() => {
                indexTrek++;
                if (indexTrek < academicDatabase.length) {
                    tampilkanTantangan();
                } else {
                    tampilkanPanelEvaluasi();
                }
            }, 2500);
        }

        function tampilkanPanelEvaluasi() {
            document.getElementById('arena-stage').style.display = 'none';
            document.getElementById('evaluation-stage').style.display = 'block';
            document.getElementById('final-metric').innerText = nilaiAkumulasi;
            
            let ulasanAkademis = "";
            if (nilaiAkumulasi >= 80) {
                ulasanAkademis = "🎯 STATUS: KOMPETEN (SANGAT BAIK). Struktur kognitif dan tingkat analisis berpikir Anda sudah setara dengan standar kelulusan nilai A pada UAS Universitas Terbuka. Selamat!";
            } else if (nilaiAkumulasi >= 60) {
                ulasanAkademis = "⚠️ STATUS: CUKUP (PERLU AKSENTUASI). Anda memahami dasar teori, namun disarankan memperdalam perbedaan regulasi strategi kognitif (Elaboration vs Organization).";
            } else {
                ulasanAkademis = "🚨 STATUS: BELUM KOMPETEN (REMEDI MANDIRI). Nilai Anda berada di bawah batas kelulusan minimal. Harap baca kembali modul cetak secara komprehensif sebelum menghadapi ujian nyata.";
            }
            document.getElementById('final-commentary').innerText = ulasanAkademis;
        }
    </script>
</body>
</html>
