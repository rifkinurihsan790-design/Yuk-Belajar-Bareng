<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cerdas Cermat Interaktif - TPEN4406 Modul 5</title>
    <style>
        /* --- GLOBAL DESIGN --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Orbitron', 'Segoe UI', sans-serif;
        }
        body {
            background: radial-gradient(circle, #0d1527 0%, #050814 100%);
            color: #e2e8f0;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- ANIMASI MASUK (CYBER SPLASH SCREEN) --- */
        #intro-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #060b18;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: all 0.8s cubic-bezier(0.74, 0.03, 0.29, 1);
        }
        .cyber-ring {
            width: 100px;
            height: 100px;
            border: 4px transparent;
            border-top: 4px solid #00f2fe;
            border-bottom: 4px solid #4facfe;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 25px;
        }
        .btn-start {
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            border: none;
            padding: 15px 40px;
            color: #050814;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.6);
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .btn-start:hover {
            transform: scale(1.1);
            box-shadow: 0 0 35px rgba(0, 242, 254, 0.9);
        }

        /* --- GAME ARENA CARD --- */
        #game-container {
            width: 90%;
            max-width: 850px;
            background: rgba(15, 23, 42, 0.8);
            border: 2px solid #1e293b;
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            display: none;
            transform: scale(0.9);
            opacity: 0;
            transition: all 0.5s ease-out;
        }

        /* --- SCOREBOARD & HEADER --- */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px dashed #334155;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }
        .live-score {
            font-size: 1.1rem;
            background: #1e1b4b;
            padding: 8px 16px;
            border-radius: 10px;
            border: 1px solid #4facfe;
            color: #00f2fe;
        }

        /* --- QUESTION BOX --- */
        .question-text {
            font-size: 1.3rem;
            line-height: 1.6;
            margin-bottom: 25px;
            color: #ffffff;
            font-weight: 500;
        }

        /* --- WRAPPER PILIHAN GANDA (BISA DIGESER JIKA KECIL/OVERFLOW) --- */
        .options-wrapper {
            max-height: 420px;
            overflow-y: auto;
            padding-right: 8px;
        }
        /* Kustomisasi Scrollbar Kece agar estetik */
        .options-wrapper::-webkit-scrollbar {
            width: 6px;
        }
        .options-wrapper::-webkit-scrollbar-thumb {
            background-color: #3b82f6;
            border-radius: 10px;
        }

        /* --- TOMBOL PILIHAN --- */
        .option-btn {
            width: 100%;
            background: #1e293b;
            border: 1px solid #334155;
            padding: 16px 20px;
            text-align: left;
            font-size: 1.05rem;
            color: #cbd5e1;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 12px;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
        }
        .option-btn:hover {
            background: #273549;
            border-color: #00f2fe;
            color: #fff;
            transform: translateX(5px);
        }
        .option-prefix {
            font-weight: bold;
            color: #00f2fe;
            margin-right: 15px;
            background: #0f172a;
            padding: 4px 10px;
            border-radius: 50%;
        }

        /* --- STATUS WARNA (BENAR/SALAH) --- */
        .correct-blink {
            background: linear-gradient(90deg, #059669, #10b981) !important;
            border-color: #34d399 !important;
            color: white !important;
            animation: pulseGlow 0.4s ease;
        }
        .wrong-blink {
            background: linear-gradient(90deg, #dc2626, #ef4444) !important;
            border-color: #f87171 !important;
            color: white !important;
        }

        /* --- HASIL AKHIR PANEL --- */
        #result-container {
            display: none;
            text-align: center;
            padding: 40px;
        }
        .final-score {
            font-size: 4rem;
            color: #00f2fe;
            margin: 20px 0;
            text-shadow: 0 0 20px rgba(0,242,254,0.5);
        }

        /* --- KEYFRAMES --- */
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes pulseGlow {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="intro-screen">
        <div class="cyber-ring"></div>
        <h1 style="margin-bottom: 20px; letter-spacing: 3px; text-align: center; padding:0 10px;">ARENA CERDAS CERMAT TPEN4406</h1>
        <button class="btn-start" onclick="mulaiKuis()">MASUK ARENA</button>
    </div>

    <div id="game-container">
        <div class="game-header">
            <span id="question-number" style="color: #94a3b8; font-weight: bold;">SOAL 1 / 10</span>
            <div class="live-score">SKOR: <span id="current-score">0</span></div>
        </div>
        
        <div id="question-text" class="question-text">Memuat pertanyaan...</div>
        
        <div class="options-wrapper" id="options-box"></div>
    </div>

    <div id="game-over-container" style="display:none; text-align:center;">
        <div id="result-container">
            <h2>UJIAN SELESAI!</h2>
            <p style="color: #94a3b8; margin-top: 10px;">Skor Kompetensi Gerakan Pendidikan Terbuka Anda:</p>
            <div class="final-score" id="score-display">0</div>
            <button class="btn-start" onclick="location.reload()">COBA LAGI</button>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playBeep(freq, type, duration) {
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.value = freq;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
            osc.stop(audioCtx.currentTime + duration);
        }

        // REKOR DATA SOAL KUIS MODUL 5
        const bankSoal = [
            {
                q: "Konsep esensial dari Gerakan Pendidikan Terbuka (Open Education Movement) dalam konteks inovasi pembelajaran abad ke-21 adalah...",
                options: [
                    "Menghapus peran dosen/tutor secara total dalam sistem perkuliahan.",
                    "Menghilangkan hambatan akses, biaya, dan legalitas dalam memperoleh pengetahuan.",
                    "Memindahkan seluruh modul cetak ke format digital tanpa mengubah kurikulum.",
                    "Membatasi hak cipta konten edukasi agar hanya bisa diakses oleh universitas negeri.",
                    "Menyediakan perangkat keras gratis bagi seluruh lapisan masyarakat."
                ],
                ans: 1
            },
            {
                q: "Dilihat dari dimensi kebebasan akademik, apa perbedaan mendasar antara Open Educational Resources (OER) dengan materi pembelajaran digital konvensional yang memiliki hak cipta penuh (All Rights Reserved)?",
                options: [
                    "OER tidak boleh direvisi atau dimodifikasi oleh pengguna.",
                    "OER selalu memiliki kualitas akademis yang lebih rendah.",
                    "OER memberikan lisensi terbuka kepada pengguna untuk membagikan, mengubah, dan menggunakan kembali materi secara legal.",
                    "OER hanya dikembangkan oleh konsorsium internasional tanpa melibatkan institusi lokal.",
                    "OER mewajibkan pengguna membayar royalti setelah penggunaan komersial 1 tahun."
                ],
                ans: 2
            },
            {
                q: "Dalam siklus pemanfaatan OER, terdapat konsep '5R Permissions' yang digagas oleh David Wiley. Tindakan mengadaptasi materi pembelajaran asli dengan menerjemahkannya ke dalam bahasa lokal atau mengubah formatnya disebut dengan...",
                options: ["Retain", "Reuse", "Revise", "Remix", "Redistribute"],
                ans: 2
            },
            {
                q: "Apabila seorang dosen menggabungkan dua atau lebih materi OER yang berbeda untuk menciptakan satu kesatuan bahan ajar baru yang koheren, maka dosen tersebut melakukan tahapan 5R yang disebut...",
                options: ["Retain", "Reuse", "Revise", "Remix", "Redistribute"],
                ans: 3
            },
            {
                q: "Organisasi nirlaba yang menyediakan lisensi standar global gratis bagi kreator untuk memberikan izin penggunaan karya akademiknya kepada publik secara legal adalah...",
                options: ["Creative Commons (CC)", "World Intellectual Property Organization (WIPO)", "UNESCO Higher Education Division", "Open CourseWare Consortium (OCWC)", "International Council for Open and Distance Education (ICDE)"],
                ans: 0
            },
            {
                q: "Lisensi Creative Commons yang mengizinkan orang lain mendistribusikan, menampilkan, dan membuat karya turunan dari karya kita, tetapi harus mencantumkan nama penemu asli serta bersifat non-komersial adalah...",
                options: ["CC BY-SA", "CC BY-NC", "CC BY-ND", "CC0 (Public Domain)", "CC BY-NC-ND"],
                ans: 1
            },
            {
                q: "Konsep Pendidikan Terbuka (Open Education) sangat selaras dengan pilar utama dari Pendidikan Jarak Jauh (PJJ). Manakah di bawah ini yang merupakan filosofi dasar yang mempersatukan keduanya?",
                options: [
                    "Mengutamakan teknologi komputer dengan spesifikasi tinggi.",
                    "Demokratisasi pendidikan melalui perluasan daya tampung dan keterjangkauan geografis.",
                    "Penyeragaman metode evaluasi akhir semester di seluruh penjuru dunia.",
                    "Mengurangi interaksi sosial antar mahasiswa agar lebih mandiri.",
                    "Menjadikan bahan ajar cetak sebagai satu-satunya rujukan utama yang mutlak."
                ],
                ans: 1
            },
            {
                q: "Salah satu bentuk inovasi masif dari gerakan pendidikan terbuka yang menawarkan perkuliahan gratis skala besar, terbuka secara daring, dan dapat diikuti oleh ribuan peserta sekaligus dari seluruh dunia adalah...",
                options: ["LMS Lokal", "MOOCs (Massive Open Online Courses)", "Virtual Reality Classroom (VRC)", "Synchronous Video Conference", "Web-based Electronic Portofolio"],
                ans: 1
            },
            {
                q: "Meskipun Gerakan Pendidikan Terbuka menawarkan fleksibilitas yang luar biasa, tantangan terbesar yang sering dihadapi oleh mahasiswa mandiri dalam ekosistem pembelajaran terbuka ini adalah...",
                options: [
                    "Ketiadaan perangkat teknologi di pasar global.",
                    "Kurangnya ragam materi pengayaan yang tersedia di internet.",
                    "Kemampuan regulasi diri (self-regulated learning) dan motivasi internal mahasiswa yang rendah.",
                    "Kebijakan internasional yang melarang penggunaan internet untuk ujian.",
                    "Penolakan dari lembaga akreditasi nasional terhadap semua jenis media digital."
                ],
                ans: 2
            },
            {
                q: "Implementasi konkret dari Gerakan Pendidikan Terbuka yang dikembangkan secara resmi oleh Universitas Terbuka (UT) untuk membantu masyarakat umum mengakses materi kuliah berkualitas secara cuma-cuma adalah...",
                options: ["Sistem Informasi Akademik (SIA)", "Ruang Baca Virtual (RBV) Khusus Internal", "UT-Online / Open CourseWare (OCW) UT", "Aplikasi Tutorial Tatap Muka (TTM)", "Program Evaluasi Akhir Semester Daring (UO)"],
                ans: 2
            }
        ];

        let indexSoal = 0;
        let skor = 0;

        function mulaiKuis() {
            playBeep(600, 'triangle', 0.15);
            setTimeout(() => playBeep(900, 'triangle', 0.2), 150);
            
            document.getElementById('intro-screen').style.transform = 'translateY(-100vh)';
            
            const arena = document.getElementById('game-container');
            arena.style.display = 'block';
            setTimeout(() => {
                arena.style.opacity = '1';
                arena.style.transform = 'scale(1)';
            }, 100);
            
            tampilkanSoal();
        }

        function tampilkanSoal() {
            if (indexSoal >= bankSoal.length) {
                selesaiKuis();
                return;
            }

            const data = bankSoal[indexSoal];
            document.getElementById('question-number').innerText = `SOAL ${indexSoal + 1} / ${bankSoal.length}`;
            document.getElementById('question-text').innerText = data.q;
            
            const boxPilihan = document.getElementById('options-box');
            boxPilihan.innerHTML = '';

            const abjad = ['A', 'B', 'C', 'D', 'E'];
            data.options.forEach((opsi, idx) => {
                const tombol = document.createElement('button');
                tombol.className = 'option-btn';
                tombol.innerHTML = `<span class="option-prefix">${abjad[idx]}</span> <span style="flex:1;">${opsi}</span>`;
                tombol.onclick = () => cekJawaban(idx, tombol);
                boxPilihan.appendChild(tombol);
            });
        }

        function cekJawaban(pilihanUser, tombolDipilih) {
            const jawabanBenar = bankSoal[indexSoal].ans;
            const seluruhTombol = document.querySelectorAll('.option-btn');
            
            // Nonaktifkan semua tombol agar tidak klik dua kali
            seluruhTombol.forEach(btn => btn.disabled = true);

            if (pilihanUser === jawabanBenar) {
                tombolDipilih.classList.add('correct-blink');
                skor += 10;
                document.getElementById('current-score').innerText = skor;
                playBeep(880, 'sine', 0.3); // Suara benar (tinggi ceria)
            } else {
                tombolDipilih.classList.add('wrong-blink');
                seluruhTombol[jawabanBenar].classList.add('correct-blink');
                playBeep(220, 'sawtooth', 0.4); // Suara salah (bass rendah)
            }

            // Transisi masuk ke soal berikutnya otomatis setelah 1.5 detik
            setTimeout(() => {
                indexSoal++;
                tampilkanSoal();
            }, 1500);
        }

        function selesaiKuis() {
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('game-over-container').style.display = 'block';
            document.getElementById('result-container').style.display = 'block';
            document.getElementById('score-display').innerText = skor;
            
            // Nada fanfare penutup cerdas cermat
            playBeep(523, 'sine', 0.1);
            setTimeout(() => playBeep(659, 'sine', 0.1), 100);
            setTimeout(() => playBeep(784, 'sine', 0.1), 200);
            setTimeout(() => playBeep(1046, 'sine', 0.4), 300);
        }
    </script>
</body>
</html>
