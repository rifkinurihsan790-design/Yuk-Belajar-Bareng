<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cerdas Cermat Interaktif - TPEN4406 Modul 3</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <style>
        /* --- UTAMA & BASE STYLE --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #03001e;
            background: linear-gradient(to bottom, #050117, #03001e, #120024);
            color: #ffffff;
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* --- 1. ANIMASI MASUK (SPLASH SCREEN) --- */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: radial-gradient(circle, #1a0033 0%, #03001e 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: all 0.8s cubic-bezier(0.74, 0.06, 0.4, 0.92);
        }
        .splash-glow {
            text-align: center;
            animation: pulseGlow 2s infinite alternate;
        }
        .splash-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 4rem;
            font-weight: 900;
            color: #00f2fe;
            text-shadow: 0 0 20px rgba(0, 242, 254, 0.6), 0 0 40px rgba(0, 242, 254, 0.3);
            letter-spacing: 6px;
            text-transform: uppercase;
        }
        .splash-sub {
            color: #ff007f;
            font-size: 1.6rem;
            margin-top: 10px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        .start-btn {
            margin-top: 50px;
            padding: 18px 45px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(45deg, #fe0979, #ff007f, #00f2fe);
            background-size: 200% auto;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 25px rgba(254, 9, 121, 0.5);
            transition: all 0.4s ease;
        }
        .start-btn:hover {
            background-position: right center;
            transform: scale(1.08);
            box-shadow: 0 0 35px rgba(0, 242, 254, 0.8);
        }

        /* --- 2. GAME SHOW ARENA --- */
        .game-container {
            display: none;
            width: 90%;
            max-width: 1100px;
            background: rgba(13, 5, 34, 0.85);
            border: 3px solid #3d0066;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 0 50px rgba(61, 0, 102, 0.6);
            backdrop-filter: blur(15px);
            position: relative;
            animation: slideInUp 0.6s ease-out forwards;
        }
        .arena-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #3d0066;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        .info-badge {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            background: #190033;
            padding: 8px 20px;
            border-radius: 15px;
            border: 1px solid #ff007f;
            color: #ff007f;
        }
        .score-badge {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            background: #001a33;
            padding: 8px 25px;
            border-radius: 15px;
            border: 1px solid #00f2fe;
            color: #00f2fe;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.5);
        }

        /* --- PERTANYAAN --- */
        .question-wrapper {
            background: linear-gradient(135deg, #16002c 0%, #0d001a 100%);
            border: 2px solid #4d0099;
            padding: 35px;
            border-radius: 20px;
            margin-bottom: 35px;
            position: relative;
        }
        .question-text {
            font-size: 1.9rem;
            font-weight: 700;
            line-height: 1.5;
            color: #f8fafc;
        }

        /* --- PILIHAN JAWABAN (CERDAS CERMAT STYLE) --- */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .option-card {
            background: #1a0b2e;
            border: 2px solid #3d1d5a;
            border-radius: 15px;
            padding: 22px 30px;
            font-size: 1.3rem;
            font-weight: 600;
            color: #e2e8f0;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            position: relative;
        }
        .option-card:hover {
            background: #2d124d;
            border-color: #00f2fe;
            color: #fff;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 242, 254, 0.2);
        }
        .option-prefix {
            font-family: 'Orbitron', sans-serif;
            color: #ff007f;
            font-weight: 900;
            margin-right: 15px;
            font-size: 1.4rem;
        }

        /* --- STATUS AKURASI --- */
        .option-card.correct {
            background: linear-gradient(45deg, #059669, #10b981) !important;
            border-color: #34d399 !important;
            color: #fff !important;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.6);
        }
        .option-card.wrong {
            background: linear-gradient(45deg, #dc2626, #ef4444) !important;
            border-color: #f87171 !important;
            color: #fff !important;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.6);
        }

        /* --- LAYAR SKOR AKHIR --- */
        .result-screen {
            display: none;
            text-align: center;
        }
        .result-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            color: #00f2fe;
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(0, 242, 254, 0.5);
        }
        .final-score-display {
            font-family: 'Orbitron', sans-serif;
            font-size: 6rem;
            font-weight: 900;
            color: #ff007f;
            margin: 25px 0;
            text-shadow: 0 0 30px rgba(255, 0, 127, 0.6);
        }
        .feedback-msg {
            font-size: 1.5rem;
            color: #cbd5e1;
            max-width: 700px;
            margin: 0 auto 40px auto;
            line-height: 1.6;
        }

        /* --- KEYFRAMES & ANIMASI --- */
        @keyframes pulseGlow {
            0% { transform: scale(0.98); opacity: 0.9; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes slideInUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* RESPONSIVE UNTUK LAYAR KECIL */
        @media (max-width: 768px) {
            .options-grid { grid-template-columns: 1fr; }
            .splash-title { font-size: 2.5rem; }
            .question-text { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <audio id="snd-correct" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-84.wav" preload="auto"></audio>
    <audio id="snd-wrong" src="https://assets.mixkit.co/active_storage/sfx/2959/2959-84.wav" preload="auto"></audio>

    <div id="splash-screen">
        <div class="splash-glow">
            <div class="splash-title">Cerdas Cermat Arena</div>
            <div class="splash-sub">TPEN4406 • INOVASI PEMBELAJARAN (MODUL 3)</div>
        </div>
        <button class="start-btn" onclick="triggerStart()">MASUK ARENA UAS</button>
    </div>

    <div class="game-container" id="game-arena">
        <div class="arena-header">
            <div class="info-badge" id="question-number">SOAL 1 / 10</div>
            <div class="score-badge">SCORE: <span id="current-score">0</span></div>
        </div>
        
        <div class="question-wrapper">
            <div class="question-text" id="target-question">Memuat pertanyaan strategis...</div>
        </div>

        <div class="options-grid" id="target-options">
            </div>
    </div>

    <div class="game-container" id="result-arena" style="text-align: center;">
        <div class="result-title">HASIL EVALUASI AKHIR</div>
        <p style="font-size: 1.3rem; color: #94a3b8; letter-spacing: 2px;">TOTAL SKOR UJIAN MANDIRI</p>
        <div class="final-score-display" id="final-score">0</div>
        <div class="feedback-msg" id="final-feedback">Mengevaluasi kompetensi...</div>
        <button class="start-btn" onclick="window.location.reload()">COBA LAGI / REMEDI</button>
    </div>

    <script>
        // DATA KISI-KISI SOAL PENTING AKURASI 90% UAS UT MODUL 3
        const databaseKuis = [
            {
                q: "Salah satu karakteristik inovasi menurut Everett M. Rogers adalah 'Relative Advantage'. Pernyataan berikut yang paling tepat menggambarkan karakteristik tersebut adalah...",
                a: [
                    "Tingkat keselarasan inovasi dengan sistem nilai, budaya, dan kebutuhan pengguna nyata.",
                    "Sejauh mana inovasi dinilai memberikan nilai tambah manfaat dan keuntungan dari metode sebelumnya.",
                    "Derajat kompleksitas operasional serta tingkat kesulitan pemahaman bagi pendidik.",
                    "Kemudahan inovasi untuk diamati secara visual dan disebarluaskan hasilnya kepada publik."
                ],
                c: 1
            },
            {
                q: "Jika sebuah sekolah menolak mengadopsi platform e-learning karena instruksi sistemnya terlalu rumit dan membingungkan bagi guru, maka inovasi tersebut terkendala aspek...",
                a: ["Compatibility", "Observability", "Complexity", "Trialability"],
                correctIndex: 2, // backup index checker
                c: 2
            },
            {
                q: "Integrasi TIK melahirkan pergeseran paradigma pendidikan baru, dari pola konvensional beralih ke konstruktivisme. Ciri khas utama dari konstruktivisme berbasis TIK adalah...",
                a: [
                    "Guru memegang kendali penuh sebagai satu-satunya produsen pengetahuan tunggal.",
                    "Siswa secara mandiri dan aktif mengonstruksi pengetahuan dibantu fasilitas teknologi.",
                    "Pembelajaran difokuskan pada hafalan materi tekstual modul cetak.",
                    "Pengurangan interaksi sosial antarsiswa di dalam lingkungan kelas."
                ],
                c: 1
            },
            {
                q: "Kapasitas esensial berupa kecakapan berpikir kritis (critical thinking), pemecahan masalah, kreativitas, komunikasi, serta kerja sama kelompok global didefinisikan sebagai...",
                a: ["Literasi Komputer Klasik", "Keterampilan Abad 21 (4Cs)", "Manajemen Kurikulum Berbasis Lokasi", "Sistem Penyebaran Inovasi Top-Down"],
                c: 1
            },
            {
                q: "Generasi pendidik senior yang lahir sebelum gelombang teknologi berkembang masif namun dituntut untuk beradaptasi menggunakan teknologi digital saat ini dikategorikan sebagai...",
                a: ["Digital Native", "Digital Nomad", "Digital Immigrant", "Digital Citizen"],
                c: 2
            },
            {
                q: "Penyebarluasan sebuah produk ide, gagasan baru, atau metode pembelajaran melalui saluran komunikasi digital tertentu kepada sekelompok masyarakat sosial seiring berjalannya waktu disebut...",
                a: ["Difusi Inovasi", "Reinvensi Kurikulum", "Diseminasi Kebijakan", "Evaluasi Otentik"],
                c: 0
            },
            {
                q: "Karakteristik inovasi 'Trialability' memberikan ruang bagi guru untuk sukses mengadopsi teknologi baru karena adanya...",
                a: [
                    "Jaminan hasil inovasi langsung dapat dipamerkan dan dilihat oleh kepala sekolah.",
                    "Kesempatan mencoba inovasi dalam skala kecil untuk meminimalkan risiko kegagalan.",
                    "Kesesuaian mutlak dengan budaya belajar yang sudah mengakar lama.",
                    "Bantuan teknisi eksternal yang mengoperasikan seluruh sistem pembelajaran."
                ],
                c: 1
            },
            {
                q: "Peradaban abad 21 mendorong restrukturisasi global dari tatanan ekonomi industri beralih menjadi sistem yang bertumpu pada produktivitas informasi. Konsep ini dikenal dengan istilah...",
                a: ["Agrarian-Based Economy", "Labor-Intensive Economy", "Knowledge-Based Economy", "Traditional Market System"],
                c: 2
            },
            {
                q: "Model inovasi kurikulum yang menyatukan disiplin ilmu Sains, Teknologi, Teknik (Engineering), Seni (Art), dan Matematika secara holistik untuk memecahkan problem riil dinamakan...",
                a: ["STEM Education", "STEAM Education", "Hybrid Pedagogy", "Blended Learning Framework"],
                c: 1
            },
            {
                q: "Berdasarkan tuntutan inovasi pembelajaran berbasis TIK, sistem penilaian akademis tidak boleh sekadar menguji hafalan pasif, melainkan harus diarahkan pada...",
                a: ["Ujian tulis pilihan ganda berbasis kertas statis", "Rekapitulasi persentase absensi kehadiran fisik", "Portofolio digital dan evaluasi kinerja otentik siswa", "Ujian hafalan rumus secara lisan bergiliran"],
                c: 2
            }
        ];

        let indexSoal = 0;
        let skorSekarang = 0;
        let inputDiterima = true;

        // FUNGSI TRANSISI MASUK ARENA
        function triggerStart() {
            const splash = document.getElementById('splash-screen');
            splash.style.opacity = '0';
            splash.style.transform = 'scale(1.1)';
            
            setTimeout(() => {
                splash.style.display = 'none';
                document.getElementById('game-arena').style.display = 'block';
                tampilkanSoal();
            }, 800);
        }

        // FUNGSI GENERATE SOAL DAN OPTION
        function tampilkanSoal() {
            inputDiterima = true;
            const data = databaseKuis[indexSoal];
            
            document.getElementById('question-number').innerText = `SOAL ${indexSoal + 1} / ${databaseKuis.length}`;
            document.getElementById('target-question').innerText = data.q;
            
            const areaOpsi = document.getElementById('target-options');
            areaOpsi.innerHTML = '';
            
            const labelAbjad = ['A', 'B', 'C', 'D'];
            data.a.forEach((teksPilihan, idx) => {
                const kartuOpsi = document.createElement('div');
                kartuOpsi.className = 'option-card';
                kartuOpsi.innerHTML = `<span class="option-prefix">${labelAbjad[idx]}</span> ${teksPilihan}`;
                kartuOpsi.onclick = () => verifikasiJawaban(idx, kartuOpsi);
                areaOpsi.appendChild(kartuOpsi);
            });
        }

        // VALIDASI JAWABAN & AKTIVASI EFEK AUDIO
        function verifikasiJawaban(idxDipilih, elemenDipilih) {
            if (!inputDiterima) return;
            inputDiterima = false;
            
            const indeksBenar = databaseKuis[indexSoal].c;
            const seluruhOpsi = document.querySelectorAll('.option-card');
            
            if (idxDipilih === indeksBenar) {
                elemenDipilih.classList.add('correct');
                document.getElementById('snd-correct').play().catch(()=>{});
                skorSekarang += 10;
                document.getElementById('current-score').innerText = skorSekarang;
            } else {
                elemenDipilih.classList.add('wrong');
                seluruhOpsi[indeksBenar].classList.add('correct');
                document.getElementById('snd-wrong').play().catch(()=>{});
            }
            
            // Beri jeda 2 detik agar user sempat membaca jawaban yang benar sebelum pindah soal
            setTimeout(() => {
                indexSoal++;
                if (indexSoal < databaseKuis.length) {
                    tampilkanSoal();
                } else {
                    tampilkanLayarSkor();
                }
            }, 2000);
        }

        // SHOW DASHBOARD SKOR AKHIR
        function tampilkanLayarSkor() {
            document.getElementById('game-arena').style.display = 'none';
            document.getElementById('result-arena').style.display = 'block';
            document.getElementById('final-score').innerText = skorSekarang;
            
            let ulasan = "";
            if (skorSekarang >= 80) {
                ulasan = "🎯 REKOR LUAR BIASA! Penguasaan materi Modul 3 Anda sangat matang. Probabilitas kelulusan UAS UT Anda diprediksi berada di atas 90%. Pertahankan!";
            } else if (skorSekarang >= 60) {
                ulasan = "⚠️ AMAN TAPI PERLU WASPADA! Anda sudah memahami dasar inovasi, tetapi disarankan membaca ulang bagian Teori Rogers dan Karakteristik Abad 21 sebelum hari H.";
            } else {
                ulasan = "🚨 ZONA BAHAYA! Nilai Anda masih di bawah ambang batas kelulusan UT. Silakan pelajari kembali rangkuman materi dan ulangi kuis simulasi ini.";
            }
            document.getElementById('final-feedback').innerText = ulasan;
        }
    </script>
</body>
</html>
